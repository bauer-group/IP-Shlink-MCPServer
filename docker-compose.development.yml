# =============================================================================
# Shlink MCP Server - Local Development Stack
# =============================================================================
# Usage:  docker compose -f docker-compose.development.yml up -d --build
#
# - Exposes ${SHLINK_MCP_PORT} directly (no reverse proxy)
# - LOG_FORMAT=console / AUTH_MODE=none permitted (dev only)
# - Optional `shlink` stanza below is commented-out; uncomment to get an
#   end-to-end stack on a single host without any external dependencies.
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  shlink-mcp:
    build:
      context: ./app/bg-shlink-mcp
      target: production
      args:
        # Build-time pin for the OpenAPI spec baked into the image.
        # Pass-through from the host env (or .env): if SHLINK_OPENAPI_VERSION
        # is unset, this arg is NOT forwarded and the Dockerfile ARG default
        # (v5.0.1) wins. Setting it to an empty string would clobber that
        # default with "" - which is why we deliberately do not use `:-`.
        SHLINK_OPENAPI_VERSION:
    image: ${SHLINK_MCP_IMAGE:-ghcr.io/bauer-group/ip-shlink-mcpserver/bg-shlink-mcp}:${SHLINK_MCP_VERSION:-latest}
    container_name: ${STACK_NAME:-bg-shlink-mcp}
    hostname: ${STACK_NAME:-bg-shlink-mcp}
    restart: unless-stopped
    <<: *logging

    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}

      ENVIRONMENT: ${ENVIRONMENT:-development}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}

      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-}
      MCP_PORT: ${MCP_PORT:-8000}

      MCP_DISPLAY_NAME: ${MCP_DISPLAY_NAME:-BAUER GROUP Shlink}
      MCP_ICON_URL: ${MCP_ICON_URL:-}
      MCP_WEBSITE_URL: ${MCP_WEBSITE_URL:-https://go.bauer-group.com/mcp-server}

      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

      SHLINK_URL: ${SHLINK_URL:?SHLINK_URL is required}
      SHLINK_API_KEY: ${SHLINK_API_KEY:?SHLINK_API_KEY is required}
      SHLINK_OPENAPI_URL: ${SHLINK_OPENAPI_URL:-file:///app/openapi/shlink.json}
      SHLINK_OPENAPI_REFRESH_INTERVAL: ${SHLINK_OPENAPI_REFRESH_INTERVAL:-0}
      SHLINK_HTTP_TIMEOUT: ${SHLINK_HTTP_TIMEOUT:-30}

      AUTH_MODE: ${AUTH_MODE:-none}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:-dev-only-do-not-use-in-production-deadbeef00000000000000000000000000}
      AUTH_REDIS_URL: ${AUTH_REDIS_URL:-}
      AUTH_STORAGE_ENCRYPTION_KEY: ${AUTH_STORAGE_ENCRYPTION_KEY:-}
      AUTH_DISK_STORAGE_PATH: ${AUTH_DISK_STORAGE_PATH:-/app/data/oauth-storage}

      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_ALLOWED_TENANTS: ${ENTRA_ALLOWED_TENANTS:-}
      ENTRA_EXTRA_SCOPES: ${ENTRA_EXTRA_SCOPES:-}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_DOMAINS: ${GOOGLE_ALLOWED_DOMAINS:-}

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}

      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-false}
      RATE_LIMITER_MAX_REQUESTS_PER_SECOND: ${RATE_LIMITER_MAX_REQUESTS_PER_SECOND:-10}
      RATE_LIMITER_BURST_CAPACITY: ${RATE_LIMITER_BURST_CAPACITY:-20}
      RATE_LIMITER_GLOBAL: ${RATE_LIMITER_GLOBAL:-false}
      # Dev runs without Traefik (direct host:port). 0 = ignore XFF, trust
      # request.client.host. Set to 1 only when you front the dev stack with
      # a local proxy.
      RATE_LIMITER_TRUSTED_PROXY_HOPS: ${RATE_LIMITER_TRUSTED_PROXY_HOPS:-0}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}

    expose:
      - ${MCP_PORT:-8000}

    ports:
      - "${SHLINK_MCP_PORT:-8000}:${MCP_PORT:-8000}"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - local

    # Persistent OAuth state for the disk-storage fallback (when AUTH_REDIS_URL
    # is empty). Without this volume mount, every container restart wipes
    # DCR client registrations + refresh tokens → users have to re-authenticate.
    volumes:
      - oauth-data:/app/data/oauth-storage

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${MCP_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # Redis is included even in dev so the OAuth client store works the same as prod.
  # Set AUTH_REDIS_URL=redis://redis:6379/0 to enable it.
  #
  # Memory profile: OAuth client registrations + token sessions are tiny (a few KB
  # each, hundreds at most). --maxmemory caps the process; --maxmemory-policy
  # noeviction makes Redis refuse new writes when full instead of silently
  # dropping OAuth state — fail loudly so operators can investigate.
  redis:
    image: ${REDIS_IMAGE:-redis}:${REDIS_VERSION:-8-alpine}
    container_name: ${STACK_NAME:-bg-shlink-mcp}-redis
    restart: unless-stopped
    <<: *logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-128mb}
      - --maxmemory-policy
      - noeviction
    mem_limit: ${REDIS_CONTAINER_MEM_LIMIT:-192m}
    # mem_reservation: 32m
    expose:
      - 6379    
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── Optional: end-to-end with a local Shlink instance ──────────────────────
  # Uncomment to spin up Shlink + its database on this same compose file.
  # Generate the API key inside the container, then paste it into .env.
  #
  # shlink:
  #   image: shlinkio/shlink:stable
  #   container_name: ${STACK_NAME:-bg-shlink-mcp}-shlink
  #   restart: unless-stopped
  #   environment:
  #     DEFAULT_DOMAIN: localhost
  #     IS_HTTPS_ENABLED: "false"
  #     GEOLITE_LICENSE_KEY: ""
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - local


volumes:
  redis-data:
    driver: local
    name: ${STACK_NAME:-bg-shlink-mcp}-redis
  oauth-data:
    driver: local
    name: ${STACK_NAME:-bg-shlink-mcp}-oauth


networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-bg-shlink-mcp}
    enable_ipv6: true
