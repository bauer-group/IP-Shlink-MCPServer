# =============================================================================
# Shlink MCP Server — Coolify Deployment
# =============================================================================
# Designed for Coolify's Docker Compose buildpack. Coolify auto-handles:
#   * container + volume naming (UUID-suffixed for project isolation)
#   * the `coolify.managed`, `coolify.applicationId`, `coolify.type` labels
#   * Traefik routing via the SERVICE_FQDN_* magic variable + `expose:` port
#   * SSL provisioning (Let's Encrypt / custom cert via the Coolify UI)
#   * a per-resource UUID-named bridge network — Coolify attaches both
#     Traefik AND all services to it, service-name DNS works out of the box
#
# Important — the previously declared custom `networks: local` block is now
# COMMENTED OUT (search for "DISABLED:" below). Reason: services on Coolify
# attach to TWO networks when you add a custom one — Coolify's UUID-named
# resource network AND your custom one. Traefik only sits on the UUID one,
# and without an explicit `traefik.docker.network=<uuid>` label it picks
# non-deterministically — manifests as intermittent or persistent 504
# Gateway Timeout. The label can't be encoded portably because the UUID is
# deployment-specific (Coolify discussions #1815, #5686). Letting Coolify
# own the network removes the problem entirely; service-name DNS between
# shlink-mcp ↔ redis still works because they share the auto-network.
#
# Two paths if you want the custom-network back (NOT recommended):
#   a) Operator sets COOLIFY_NETWORK_NAME=<your-resource-uuid> in the
#      Coolify env panel + uncomments the labels stub on the shlink-mcp
#      service further down. Find the UUID via:
#         docker network ls --filter "label=coolify.applicationId"
#      or read it from the Coolify UI URL (last segment of /application/...).
#   b) Hardcode the UUID directly in the labels — breaks on every redeploy
#      that allocates a new resource UUID; only viable for static fleets.
#
# Operator workflow (Coolify UI):
#   1. Set the domain in the application's "Domains" field
#      → SERVICE_FQDN_SHLINKMCP is auto-populated, Traefik is wired
#   2. Set the pre-shared / external secrets in "Environment Variables":
#      SHLINK_URL, SHLINK_API_KEY, AUTH_MODE, OIDC/Entra/Google credentials
#   3. Crypto material (JWT signing key, storage encryption key) is
#      auto-generated by Coolify on first deploy and persisted in its DB.
#      Override in the UI to rotate or to migrate an existing key.
#   4. Deploy.
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  shlink-mcp:
    image: ${SHLINK_MCP_IMAGE:-ghcr.io/bauer-group/ip-shlink-mcpserver/bg-shlink-mcp}:${SHLINK_MCP_VERSION:-latest}
    restart: unless-stopped
    <<: *logging

    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}

      ENVIRONMENT: ${ENVIRONMENT:-production}

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}

      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}

      MCP_DISPLAY_NAME: ${MCP_DISPLAY_NAME:-BAUER GROUP Shlink}
      MCP_ICON_URL: ${MCP_ICON_URL:-}
      MCP_WEBSITE_URL: ${MCP_WEBSITE_URL:-https://go.bauer-group.com/mcp-server}

      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      SHLINK_URL: ${SHLINK_URL:?SHLINK_URL is required}
      SHLINK_API_KEY: ${SHLINK_API_KEY:?SHLINK_API_KEY is required}
      SHLINK_OPENAPI_URL: ${SHLINK_OPENAPI_URL:-file:///app/openapi/shlink.json}
      SHLINK_OPENAPI_REFRESH_INTERVAL: ${SHLINK_OPENAPI_REFRESH_INTERVAL:-0}
      SHLINK_HTTP_TIMEOUT: ${SHLINK_HTTP_TIMEOUT:-30}

      AUTH_MODE: ${AUTH_MODE:?AUTH_MODE is required}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:?AUTH_JWT_SIGNING_KEY is required}
      AUTH_STORAGE_ENCRYPTION_KEY: ${AUTH_STORAGE_ENCRYPTION_KEY:?AUTH_STORAGE_ENCRYPTION_KEY is required}
      AUTH_REDIS_URL: ${AUTH_REDIS_URL:-redis://redis:6379/0}
      AUTH_DISK_STORAGE_PATH: ${AUTH_DISK_STORAGE_PATH:-/app/data/oauth-storage}

      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_ALLOWED_TENANTS: ${ENTRA_ALLOWED_TENANTS:-}
      ENTRA_EXTRA_SCOPES: ${ENTRA_EXTRA_SCOPES:-}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_DOMAINS: ${GOOGLE_ALLOWED_DOMAINS:-}

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}

      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-true}
      RATE_LIMITER_MAX_REQUESTS_PER_SECOND: ${RATE_LIMITER_MAX_REQUESTS_PER_SECOND:-10}
      RATE_LIMITER_BURST_CAPACITY: ${RATE_LIMITER_BURST_CAPACITY:-20}
      RATE_LIMITER_GLOBAL: ${RATE_LIMITER_GLOBAL:-false}
      # 1 = Coolify's bundled Traefik in front. Bump to 2 if you stack
      # Cloudflare / another edge proxy in front of Coolify.
      RATE_LIMITER_TRUSTED_PROXY_HOPS: ${RATE_LIMITER_TRUSTED_PROXY_HOPS:-1}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}

    expose:
      - ${MCP_PORT:-8000}

    depends_on:
      redis:
        condition: service_healthy

    # DISABLED: see top-of-file comment. Coolify auto-attaches services to
    # its UUID-named resource network; adding a second custom network is
    # what caused 504 Gateway Timeout (Traefik routed via the wrong bridge).
    # networks:
    #   - local

    # OPTIONAL — only uncomment if you NEED the custom `local` network
    # back AND have set COOLIFY_NETWORK_NAME=<your-resource-uuid> in the
    # Coolify env panel. The labels pin Traefik to the right bridge and
    # to the right upstream port, removing the routing ambiguity.
    # labels:
    #   - "traefik.docker.network=${COOLIFY_NETWORK_NAME:?set COOLIFY_NETWORK_NAME to your Coolify resource UUID, e.g. s5qiyy0f8gwsgblp3ojxp224}"
    #   - "traefik.http.services.shlink-mcp.loadbalancer.server.port=${MCP_PORT:-8000}"

    # Persistent OAuth state for the disk-storage fallback (when AUTH_REDIS_URL
    # is empty). Defense in depth — even if the operator runs Redis-backed
    # storage today and disables it later, OAuth state survives the switch.
    volumes:
      - oauth-data:/app/data/oauth-storage

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${MCP_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # Memory profile: OAuth client registrations + token sessions are tiny (a few KB
  # each, hundreds at most). --maxmemory caps the process; --maxmemory-policy
  # noeviction makes Redis refuse new writes when full instead of silently
  # dropping OAuth state — fail loudly so operators can investigate.
  redis:
    image: ${REDIS_IMAGE:-redis}:${REDIS_VERSION:-8-alpine}
    restart: unless-stopped
    <<: *logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - noeviction
    expose:
      - 6379
    volumes:
      - redis-data:/data
    # DISABLED: see top-of-file comment. Redis stays on Coolify's auto-network;
    # `shlink-mcp` finds it via service-name DNS as `redis:6379`.
    # networks:
    #   - local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  redis-data:
    driver: local
    name: bg-shlink-mcp-redis
  oauth-data:
    driver: local
    name: bg-shlink-mcp-oauth


# DISABLED: custom networks force a Traefik routing ambiguity on Coolify —
# see top-of-file comment for the full explanation. Coolify auto-creates a
# UUID-named bridge network per resource (e.g. s5qiyy0f8gwsgblp3ojxp224) and
# attaches Traefik to it. Re-enabling this block requires the labels stub on
# the shlink-mcp service to be uncommented AND COOLIFY_NETWORK_NAME set in
# the operator env panel — otherwise 504s come back.
#
# networks:
#   local:
#     driver: bridge
#     name: bg-shlink-mcp
#     enable_ipv6: true
